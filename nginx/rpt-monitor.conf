# RPT Monitor Nginx Configuration
# This configuration serves static files and proxies API requests to the Node.js server

upstream rpt_monitor_backend {
  # PM2 runs on port 3000 (single instance on Windows)
  server localhost:3000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

server {
  listen 80;
  server_name localhost 127.0.0.1 *.local;
  
  # Increase request body size for file uploads
  client_max_body_size 100M;
  
  # Enable gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
  gzip_disable "MSIE [1-6]\.";
  gzip_comp_level 6;
  
  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  
  # Serve static files from dist directory
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm)$ {
    root C:/Users/USER/Desktop/rpt_monitor/rpt_monitor/dist;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }
  
  # Serve PWA manifest and robots.txt
  location ~ ^/(manifest.webmanifest|robots.txt|sitemap.xml)$ {
    root C:/Users/USER/Desktop/rpt_monitor/rpt_monitor/dist;
    add_header Cache-Control "public, max-age=604800";
  }
  
  # Service worker - no cache
  location /sw.js {
    root C:/Users/USER/Desktop/rpt_monitor/rpt_monitor/dist;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    add_header Service-Worker-Allowed "/";
  }
  
  # API and application routes - proxy to Node.js backend
  location / {
    proxy_pass http://rpt_monitor_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-Forwarded-Port $server_port;
    
    # Timeouts (300s for SSE / long-polling)
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    # Disable buffering for SSE streams
    proxy_buffering off;
    proxy_cache off;
  }
  
  # Health check endpoint
  location /health {
    proxy_pass http://rpt_monitor_backend;
    access_log off;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
    proxy_buffering off;
  }
  
  # Deny access to sensitive files and directories
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
  
  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }
}

